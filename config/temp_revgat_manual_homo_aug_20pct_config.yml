seed: 1911
dataset: ogbnarxiv
edge_type_selection:
  ogbnarxiv:
  - references
  - author
  - venue
  - fos
  pubmed:
  - references
  - author
  - journal
  - mesh
node_embs: preloaded_in_subset
data:
  graph_dataset:
    ogbnarxiv: /Users/macsaumya/Documents/BTP/Model and Data/edgehetero-nodeproppred/data/ogbnarxiv_heterodata_subset_20pct.pt
